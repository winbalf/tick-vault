version: 2

models:
  - name: int_ohlcv_1m
    description: One-minute OHLCV candles and VWAP per exchange and symbol from staged trades.
    columns:
      - name: metric_ts
        description: UTC minute bucket start.
        tests:
          - not_null
      - name: metric_date
        tests:
          - not_null
      - name: exchange
        tests:
          - not_null
      - name: symbol
        tests:
          - not_null
      - name: open_price
        tests:
          - not_null
      - name: high_price
        tests:
          - not_null
      - name: low_price
        tests:
          - not_null
      - name: close_price
        tests:
          - not_null
      - name: base_volume
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              strictly: false
      - name: zero_volume_flag
        description: True when the one-minute candle has no traded volume.
        tests:
          - not_null
      - name: rolling_avg_close_5m
        description: Five-minute rolling average of close price by exchange and symbol.
      - name: price_spike_flag
        description: True when close deviates by more than 10 percent from 5-minute rolling average.
        tests:
          - not_null
      - name: anomaly_flag
        description: Composite anomaly flag for zero-volume and price-spike conditions.
        tests:
          - not_null
      - name: vwap
        tests:
          - not_null

  - name: int_depth_1m
    description: One-minute rollups of best bid, best ask, spread, and mid from staged depth snapshots.
    columns:
      - name: metric_ts
        description: UTC minute bucket start.
        tests:
          - not_null
      - name: metric_date
        tests:
          - not_null
      - name: exchange
        tests:
          - not_null
      - name: symbol
        tests:
          - not_null
      - name: avg_spread_bps
        tests:
          - not_null
      - name: avg_mid_price
        tests:
          - not_null
      - name: median_mid_price
        tests:
          - not_null

  - name: int_dlq_1m
    description: Minute-level dead-letter message count for pipeline quality monitoring.
    columns:
      - name: metric_ts
        tests:
          - not_null
          - unique
      - name: metric_date
        tests:
          - not_null
      - name: dead_letter_count
        tests:
          - not_null
