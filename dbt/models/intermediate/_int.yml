version: 2

models:
  - name: int_ohlcv_1m
    description: One-minute OHLCV candles and VWAP per exchange and symbol from staged trades.
    columns:
      - name: metric_ts
        description: UTC minute bucket start.
        tests:
          - not_null
      - name: metric_date
        tests:
          - not_null
      - name: exchange
        tests:
          - not_null
      - name: symbol
        tests:
          - not_null
      - name: open_price
        tests:
          - not_null
      - name: high_price
        tests:
          - not_null
      - name: low_price
        tests:
          - not_null
      - name: close_price
        tests:
          - not_null
      - name: base_volume
        tests:
          - not_null
      - name: vwap
        tests:
          - not_null

  - name: int_depth_1m
    description: One-minute rollups of best bid, best ask, spread, and mid from staged depth snapshots.
    columns:
      - name: metric_ts
        description: UTC minute bucket start.
        tests:
          - not_null
      - name: metric_date
        tests:
          - not_null
      - name: exchange
        tests:
          - not_null
      - name: symbol
        tests:
          - not_null
      - name: avg_spread_bps
        tests:
          - not_null
      - name: avg_mid_price
        tests:
          - not_null
      - name: median_mid_price
        tests:
          - not_null
