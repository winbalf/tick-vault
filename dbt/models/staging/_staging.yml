version: 2

models:
  - name: stg_trades
    description: Typed trade ticks from bronze; deduped on exchange, symbol, trade_id; invalid rows removed.
    tests:
      - unique_column_combination:
          columns: ["trade_id", "event_ts"]
    columns:
      - name: trade_key
        description: Surrogate key for uniqueness tests (topic|partition|offset).
        tests:
          - not_null
          - unique
      - name: exchange
        tests:
          - not_null
      - name: symbol
        tests:
          - not_null
      - name: trade_id
        tests:
          - not_null
      - name: event_ts
        tests:
          - not_null
      - name: price
        tests:
          - not_null
      - name: quantity
        tests:
          - not_null

  - name: stg_depth
    description: Order book snapshots with best bid and best ask parsed from the first depth level.
    columns:
      - name: depth_key
        description: Surrogate key for uniqueness tests (topic|partition|offset).
        tests:
          - not_null
          - unique
      - name: exchange
        tests:
          - not_null
      - name: symbol
        tests:
          - not_null
      - name: event_ts
        tests:
          - not_null
      - name: best_bid_price
        tests:
          - not_null
      - name: best_ask_price
        tests:
          - not_null
      - name: mid_price
        tests:
          - not_null
