# Templated at container start from tickvault-entrypoint.sh (see docker/grafana/Dockerfile).
# PEM is injected from /etc/grafana/sa.json; other fields from GCP_* env vars.
apiVersion: 1
datasources:
  - name: BigQuery
    uid: bq_tickvault
    type: grafana-bigquery-datasource
    access: proxy
    isDefault: true
    editable: true
    jsonData:
      authenticationType: jwt
      defaultProject: __GCP_PROJECT__
      clientEmail: __GCP_CLIENT_EMAIL__
      tokenUri: __GCP_TOKEN_URI__
    secureJsonData:
      privateKey: |
        @TICKVAULT_PEM@
