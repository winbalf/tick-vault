services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.1.9
    command:
      - redpanda
      - start
      - --smp
      - "1"
      - --reserve-memory
      - 0M
      - --overprovisioned
      - --node-id
      - "0"
      - --kafka-addr
      - internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr
      - internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr
      - internal://0.0.0.0:8082
      - --advertise-pandaproxy-addr
      - internal://redpanda:8082
    ports:
      - "19092:19092"
      - "9644:9644"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -Eq 'Healthy:[[:space:]]*true'"]
      interval: 10s
      timeout: 10s
      retries: 10

  console:
    image: docker.redpanda.com/redpandadata/console:v2.6.0
    depends_on:
      redpanda:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: redpanda:9092
    ports:
      - "8080:8080"

  topic-init:
    build:
      context: .
      dockerfile: docker/topic-init.Dockerfile
    depends_on:
      redpanda:
        condition: service_healthy
    env_file:
      - .env
    restart: "no"

  minio:
    image: minio/minio:RELEASE.2024-08-29T01-40-52Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:RELEASE.2024-08-26T10-49-58Z
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done;
      mc mb -p local/tick-vault || true;
      mc version enable local/tick-vault || true;
      "
    restart: "no"

  flink-jobmanager:
    build:
      context: .
      dockerfile: docker/flink/Dockerfile
    command: jobmanager
    depends_on:
      redpanda:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      JOB_MANAGER_RPC_ADDRESS: flink-jobmanager
      FLINK_PROPERTIES: |-
        jobmanager.rpc.address: flink-jobmanager
        fs.s3a.endpoint: http://minio:9000
        fs.s3a.access.key: minioadmin
        fs.s3a.secret.key: minioadmin
        fs.s3a.path.style.access: true
        fs.s3a.connection.ssl.enabled: false
        fs.s3a.aws.credentials.provider: org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider
    ports:
      - "8081:8081"

  flink-taskmanager:
    build:
      context: .
      dockerfile: docker/flink/Dockerfile
    command: taskmanager
    depends_on:
      - flink-jobmanager
    environment:
      JOB_MANAGER_RPC_ADDRESS: flink-jobmanager
      FLINK_PROPERTIES: |-
        fs.s3a.endpoint: http://minio:9000
        fs.s3a.access.key: minioadmin
        fs.s3a.secret.key: minioadmin
        fs.s3a.path.style.access: true
        fs.s3a.connection.ssl.enabled: false
        fs.s3a.aws.credentials.provider: org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider

  flink-submit-bronze:
    profiles:
      - bronze
    build:
      context: .
      dockerfile: docker/flink/Dockerfile
    depends_on:
      flink-jobmanager:
        condition: service_started
      flink-taskmanager:
        condition: service_started
      minio:
        condition: service_started
      redpanda:
        condition: service_healthy
    env_file:
      - .env
    environment:
      FLINK_JOBMANAGER_HOST: flink-jobmanager
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      BRONZE_SINK_BASE: s3a://tick-vault/bronze
      CHECKPOINT_DIR: s3a://tick-vault/flink-checkpoints
      FLINK_PROPERTIES: |-
        fs.s3a.endpoint: http://minio:9000
        fs.s3a.access.key: minioadmin
        fs.s3a.secret.key: minioadmin
        fs.s3a.path.style.access: true
        fs.s3a.connection.ssl.enabled: false
        fs.s3a.aws.credentials.provider: org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider
    entrypoint: ["/opt/flink/scripts/wait_and_submit.sh"]
    restart: "no"

  producers:
    build:
      context: .
      dockerfile: docker/producers.Dockerfile
    depends_on:
      redpanda:
        condition: service_healthy
      topic-init:
        condition: service_completed_successfully
    env_file:
      - .env
    command: ["python", "-m", "producers.main"]
    restart: unless-stopped

volumes:
  minio_data:
